name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  DOCKER_USERNAME: iwannay
  IMAGE_NAME: ${{ env.DOCKER_USERNAME }}/jiascheduler

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' # 仅在 main 分支 push 触发

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          # 进入 GitHub 仓库 -> Settings -> Secrets and variables -> Actions
          # 创建DOCKER_PAT变量，分别填入你的Docker令牌
          username: ${{ env.DOCKER_USERNAME }}
          token: ${{ secrets.DOCKER_PAT }} #

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Verify pushed image
        run: docker pull ${{ env.IMAGE_NAME }}:latest
